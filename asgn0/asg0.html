<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assignment 0 - Vector Operations</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 20px;
    }

    canvas {
      display: block;
      background: black;
      border: 1px solid #333;
      margin-bottom: 16px;
    }

    .controls {
      margin-bottom: 12px;
    }

    label {
      margin-right: 6px;
    }

    input, select, button {
      margin-right: 10px;
      margin-bottom: 10px;
      padding: 4px 8px;
    }
  </style>
</head>
<body onload="main()">
  <h1>ASG0 - Vector Operations</h1>

  <canvas id="example" width="400" height="400" aria-label="Vector drawing canvas"></canvas>

  <div class="controls">
    <h3>Vector 1 (Red)</h3>
    <label for="v1x">v1 x:</label>
    <input type="number" id="v1x" step="any" value="2.25" />

    <label for="v1y">v1 y:</label>
    <input type="number" id="v1y" step="any" value="2.25" />
  </div>

  <div class="controls">
    <h3>Vector 2 (Blue)</h3>
    <label for="v2x">v2 x:</label>
    <input type="number" id="v2x" step="any" value="1.5" />

    <label for="v2y">v2 y:</label>
    <input type="number" id="v2y" step="any" value="-1.0" />
  </div>

  <div class="controls">
    <button onclick="handleDrawEvent()">Draw</button>
  </div>

  <div class="controls">
    <label for="operation">Operation:</label>
    <select id="operation">
      <option value="add">Add</option>
      <option value="sub">Subtract</option>
      <option value="mul">Multiply</option>
      <option value="div">Divide</option>
      <option value="magnitude">Magnitude</option>
      <option value="normalize">Normalize</option>
      <option value="angle">Angle between</option>
      <option value="area">Area</option>
    </select>

    <label for="scalar">Scalar:</label>
    <input type="number" id="scalar" step="any" value="2" />

    <button onclick="handleDrawOperationEvent()">Draw Operation</button>
  </div>

  <script src="lib/cuon-matrix-cse160.js"></script>
  <script src="asg0.js"></script>
</body>
</html>
